name: Build and release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        runtime: [win-x64, win-arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Publish ${{ matrix.runtime }}
        shell: pwsh
        run: dotnet publish WinVClipboard.csproj -c Release -r ${{ matrix.runtime }} --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o artifacts/${{ matrix.runtime }}
      - name: Import signing certificate
        if: ${{ secrets.WINDOWS_CERTIFICATE != '' }}
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: ./scripts/Sign-Artifacts.ps1 -Directory artifacts/${{ matrix.runtime }}
      - name: Create archive
        shell: pwsh
        run: Compress-Archive -Path artifacts/${{ matrix.runtime }}/* -DestinationPath artifacts/WinVClipboard-${{ matrix.runtime }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: WinVClipboard-${{ matrix.runtime }}
          path: artifacts/WinVClipboard-${{ matrix.runtime }}.zip

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.zip
